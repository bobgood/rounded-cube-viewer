<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounded cube viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #0d1117;
      }
      #app { width: 100%; height: 100%; }

      /* ── Control panel ── */
      #controls {
        position: fixed;
        top: 12px; right: 12px;
        background: rgba(13,17,23,0.88);
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px 16px;
        color: #c9d1d9;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 210px;
        backdrop-filter: blur(6px);
      }
      #controls label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      #controls input[type=range] {
        flex: 1;
        accent-color: #3d8bfd;
      }
      #controls span.val {
        min-width: 36px;
        text-align: right;
        color: #8b949e;
      }
      #controls select {
        width: 100%;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        padding: 4px 6px;
        font-size: 13px;
        cursor: pointer;
      }
      #restart-btn {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        padding: 6px 0;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }
      #restart-btn:hover { background: #30363d; }

      /* ── Scene checklist (two rows) ── */
      #scene-checklist {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .scene-checklist-row {
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .cl-item {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        white-space: nowrap;
      }
      .cl-item input[type=checkbox] {
        accent-color: #3d8bfd;
        cursor: pointer;
      }
      .cl-item label { cursor: pointer; }

      /* ── Hover info ── */
      #hover-info {
        position: fixed;
        bottom: 40px;
        left: 12px;
        background: rgba(13,17,23,0.80);
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 4px 10px;
        color: #58a6ff;
        font-size: 13px;
        font-family: monospace;
        pointer-events: none;
        min-height: 26px;
        min-width: 60px;
      }

      /* ── Hint bar ── */
      #hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        color: #8b949e;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="controls">

      <!-- View selector -->
      <select id="view-select">
        <option value="cylinder">Cylinder view</option>
        <option value="spinning_cubes">Spinning cubes</option>
      </select>

      <!-- Scene element checklist — populated by JS (two rows) -->
      <div id="scene-checklist">
        <div class="scene-checklist-row" id="scene-checklist-row1"></div>
        <div class="scene-checklist-row" id="scene-checklist-row2"></div>
      </div>

      <!-- Transparency -->
      <label title="Cy, Ca, Pl, Hs voxel layers">
        Parts
        <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="opacity-val">0.50</span>
      </label>
      <label title="Gm union metal grid">
        Metal (Gm)
        <input type="range" id="metal-opacity-slider" min="0" max="1" step="0.01" value="0.5">
        <span class="val" id="metal-opacity-val">0.50</span>
      </label>

      <!-- Hide voxels near the camera (peel shell to see inside) -->
      <label title="Hides voxels closer than this distance to the camera">
        Peel (cam)
        <input type="range" id="peel-slider" min="0" max="6.5" step="0.02" value="0">
        <span class="val" id="peel-val">0.00</span>
      </label>

      <!-- Physics sliders (Python reads & can use or ignore) -->
      <label>
        Spin
        <input type="range" id="spin-slider" min="0" max="5" step="0.1" value="0.8">
        <span class="val" id="spin-val">0.8</span>
      </label>
      <label>
        Damping
        <input type="range" id="damp-slider" min="0.90" max="1.00" step="0.001" value="0.985">
        <span class="val" id="damp-val">0.985</span>
      </label>
      <label>
        Strength
        <input type="range" id="strength-slider" min="0" max="2" step="0.05" value="0.4">
        <span class="val" id="strength-val">0.40</span>
      </label>

      <button id="restart-btn">&#8635; Restart</button>
    </div>

    <!-- Hover label -->
    <div id="hover-info"></div>

    <div id="hint">Peel (cam) &nbsp;·&nbsp; Gm/Cm = FEA debug &nbsp;·&nbsp; Cu/Cv = coil display</div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
