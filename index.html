<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounded cube viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #0d1117;
      }

      #layout {
        display: flex;
        width: 100%;
        height: 100%;
      }

      /* 3D view: all space left of the panel */
      #viewport {
        flex: 1;
        min-width: 0;
        position: relative;
        overflow: hidden;
        background: #0d1117;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
      }

      /* Full-height right rail (scroll if tall) */
      #controls {
        flex: 0 0 188px;
        width: 188px;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: #0d1117;
        border-left: 1px solid #30363d;
        padding: 10px 10px 16px;
        color: #c9d1d9;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #controls::-webkit-scrollbar { width: 8px; }
      #controls::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
      }

      #controls .panel-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8b949e;
        margin-bottom: 2px;
      }

      #controls label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
      }
      #controls label.mode-label {
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
      }
      #controls input[type=range] {
        flex: 1;
        min-width: 0;
        accent-color: #3d8bfd;
      }
      #controls span.val {
        flex: 0 0 32px;
        text-align: right;
        color: #8b949e;
        font-size: 11px;
      }
      #controls label.checkbox {
        justify-content: flex-start;
        gap: 6px;
      }
      #controls label.checkbox input[type=checkbox] {
        flex: 0 0 auto;
        accent-color: #3d8bfd;
      }
      #controls select {
        width: 100%;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        padding: 5px 6px;
        font-size: 12px;
        cursor: pointer;
      }

      .control-section.hidden { display: none; }

      #restart-btn, #solve-btn {
        width: 100%;
        border-radius: 6px;
        padding: 6px 0;
        cursor: pointer;
        font-size: 12px;
      }
      #restart-btn {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
      }
      #restart-btn:hover { background: #30363d; }
      #solve-btn {
        background: #1f6feb;
        border: 1px solid #388bfd;
        color: #fff;
        font-weight: 600;
      }
      #solve-btn:hover { background: #388bfd; }
      #solve-btn:disabled {
        background: #30363d;
        border-color: #30363d;
        color: #8b949e;
        cursor: default;
      }
      #solve-status {
        font-size: 11px;
        color: #8b949e;
        min-height: 14px;
        text-align: center;
      }

      #hover-info {
        position: absolute;
        bottom: 36px;
        left: 12px;
        background: rgba(13,17,23,0.80);
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 4px 10px;
        color: #58a6ff;
        font-size: 13px;
        font-family: monospace;
        pointer-events: none;
        z-index: 2;
      }
      #hint {
        position: absolute;
        left: 12px;
        bottom: 10px;
        color: #8b949e;
        font-size: 11px;
        line-height: 1.4;
        pointer-events: none;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="viewport">
        <div id="app"></div>
        <div id="hover-info"></div>
        <div id="hint">Hover face → corner (c1–c8) · Peel to see inside</div>
      </div>

      <aside id="controls">
        <div>
          <div class="panel-title">Mode</div>
          <label class="mode-label">
            <select id="mode-select">
              <option value="cylinder:ngmesh">NGSolve mesh (rod + coil)</option>
              <option value="cylinder:frame">30 coils experiment</option>
              <option value="cylinder:dipole">Dipole (e12 rod + coil)</option>
              <option value="cylinder:12dipoles">12 dipoles (all edges)</option>
              <option value="spinning_cubes">Spinning cubes</option>
            </select>
          </label>
        </div>

        <label title="Coil drive / current scale (logarithmic: 0.1× … 10×, centre = 1×). In the NGSolve scene this is the knob that pushes iron into saturation.">
          Strength
          <input type="range" id="strength-slider" min="0" max="1" step="0.001" value="0.5">
          <span class="val" id="strength-val">1.00</span>
        </label>

        <div id="cylinder-controls" class="control-section">
          <label title="Cube envelope outline (Ou)">
            Ou outline
            <input type="range" id="ou-opacity-slider" min="0" max="1" step="0.01" value="0.35">
            <span class="val" id="ou-opacity-val">0.35</span>
          </label>
          <label title="Cy, Ca, Pl, Hs structural voxels">
            Parts
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
            <span class="val" id="opacity-val">0.50</span>
          </label>
          <label title="NGSolve mesh / grid opacity (also Gm debug grid in voxel scenes)">
            Grid
            <input type="range" id="metal-opacity-slider" min="0" max="1" step="0.01" value="0">
            <span class="val" id="metal-opacity-val">0.00</span>
          </label>
          <label title="Cu / Cv current arrows">
            Current
            <input type="range" id="current-opacity-slider" min="0" max="1" step="0.01" value="0.85">
            <span class="val" id="current-opacity-val">0.85</span>
          </label>
          <label title="Cm coil-grid J arrows (debug)">
            Cur debug
            <input type="range" id="current-debug-opacity-slider" min="0" max="1" step="0.01" value="0">
            <span class="val" id="current-debug-opacity-val">0.00</span>
          </label>
          <label title="Traced B-field lines">
            B lines
            <input type="range" id="bline-opacity-slider" min="0" max="1" step="0.01" value="0.9">
            <span class="val" id="bline-opacity-val">0.90</span>
          </label>
          <label title="Hides voxels closer than this distance to the camera">
            Peel (cam)
            <input type="range" id="peel-slider" min="0" max="6.5" step="0.02" value="0">
            <span class="val" id="peel-val">0.00</span>
          </label>
          <label title="Steel UNSATURATED permeability μ_init for the B-line solve (log scale); 1 = air. In the NGSolve scene the iron also saturates toward ~1.8 T (B–H curve), so high μ only holds until the drive pushes it into saturation.">
            Steel μ
            <input type="range" id="bline-mu-slider" min="0" max="1" step="0.001" value="0.811">
            <span class="val" id="bline-mu-val">1000</span>
          </label>
          <label class="checkbox" title="Sat ON = nonlinear B–H saturation for typical iron (Newton + current ramping; slower, physically correct). Sat OFF = fast linear solve at the slider μ (no saturation). NGSolve scene only.">
            <input type="checkbox" id="sat-checkbox">
            Sat
          </label>
          <button id="solve-btn">Solve B field</button>
          <div id="solve-status"></div>
        </div>

        <div id="spin-controls" class="control-section hidden">
          <label>
            Spin
            <input type="range" id="spin-slider" min="0" max="5" step="0.1" value="0.8">
            <span class="val" id="spin-val">0.8</span>
          </label>
          <label>
            Damping
            <input type="range" id="damp-slider" min="0.90" max="1.00" step="0.001" value="0.985">
            <span class="val" id="damp-val">0.985</span>
          </label>
        </div>

        <button id="restart-btn">Restart</button>
      </aside>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
