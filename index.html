<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounded cube viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #0d1117;
      }

      #layout {
        display: flex;
        width: 100%;
        height: 100%;
      }

      /* 3D view: all space left of the panel */
      #viewport {
        flex: 1;
        min-width: 0;
        position: relative;
        overflow: hidden;
        background: #0d1117;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
      }

      /* Full-height right rail (scroll if tall) */
      #controls {
        flex: 0 0 188px;
        width: 188px;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: #0d1117;
        border-left: 1px solid #30363d;
        padding: 10px 10px 16px;
        color: #c9d1d9;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #controls::-webkit-scrollbar { width: 8px; }
      #controls::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
      }

      #controls .panel-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8b949e;
        margin-bottom: 2px;
      }

      #controls label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
      }
      #controls label.mode-label {
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
      }
      #controls input[type=range] {
        flex: 1;
        min-width: 0;
        accent-color: #3d8bfd;
      }
      #controls span.val {
        flex: 0 0 32px;
        text-align: right;
        color: #8b949e;
        font-size: 11px;
      }
      #controls span#drive-readout {
        flex: 1 1 auto;
        text-align: right;
        white-space: nowrap;
      }
      #controls span#bsurf-val {
        flex: 0 0 52px;
        white-space: nowrap;
      }
      #controls label.checkbox {
        justify-content: flex-start;
        gap: 6px;
      }
      #controls label.checkbox input[type=checkbox] {
        flex: 0 0 auto;
        accent-color: #3d8bfd;
      }
      #controls select {
        width: 100%;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        padding: 5px 6px;
        font-size: 12px;
        cursor: pointer;
      }

      .control-section.hidden { display: none; }

      /* Motion view shows only the per-box dropdowns; cylinder-only controls hide. */
      #motion-controls { display: none; }
      #controls.view-motion #motion-controls { display: block; }
      #controls.view-motion #cylinder-controls,
      #controls.view-motion #strength-control,
      #controls.view-motion #config-mode-label { display: none; }

      #restart-btn, #solve-btn {
        width: 100%;
        border-radius: 6px;
        padding: 6px 0;
        cursor: pointer;
        font-size: 12px;
      }
      #restart-btn {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
      }
      #restart-btn:hover:not(:disabled) { background: #30363d; }
      #restart-btn:disabled { color: #6e7681; cursor: default; opacity: 0.6; }
      #solve-btn {
        background: #1f6feb;
        border: 1px solid #388bfd;
        color: #fff;
        font-weight: 600;
      }
      #solve-btn:hover { background: #388bfd; }
      #build-fields-btn {
        flex: 0 0 auto;
        border-radius: 5px;
        padding: 1px 8px;
        font-size: 11px;
        cursor: pointer;
        background: #1f6feb;
        border: 1px solid #388bfd;
        color: #fff;
        font-weight: 600;
      }
      #build-fields-btn:hover:not(:disabled) { background: #388bfd; }
      #build-fields-btn:disabled {
        background: #30363d;
        border-color: #30363d;
        color: #8b949e;
        cursor: default;
      }
      #solve-btn:disabled {
        background: #30363d;
        border-color: #30363d;
        color: #8b949e;
        cursor: default;
      }
      #solve-status {
        font-size: 11px;
        color: #8b949e;
        min-height: 14px;
        text-align: center;
      }

      #hover-info {
        position: absolute;
        bottom: 36px;
        left: 12px;
        background: rgba(13,17,23,0.80);
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 4px 10px;
        color: #58a6ff;
        font-size: 13px;
        font-family: monospace;
        pointer-events: none;
        z-index: 2;
      }
      #hint {
        position: absolute;
        left: 12px;
        bottom: 10px;
        color: #8b949e;
        font-size: 11px;
        line-height: 1.4;
        pointer-events: none;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="viewport">
        <div id="app"></div>
        <div id="hover-info"></div>
        <div id="hint">Hover face → corner (c1–c8)</div>
      </div>

      <aside id="controls">
        <div>
          <div class="panel-title">Mode</div>
          <label class="mode-label">
            <select id="mode-select">
              <option value="cylinder:1dipole">1 dipole</option>
              <option value="cylinder:12dipoles_ng">12 dipoles</option>
              <option value="cylinder:potcore_ng">1 pot core</option>
              <option value="cylinder:30coils_ng">30 coils</option>
              <option value="motion:12dipoles_ng">12 dipole motion</option>
            </select>
          </label>
          <label id="config-mode-label" class="mode-label" title="Coil excitation pattern for the 12-dipole scene. Each pattern drives a different set of edge coils; we run all of them to build the per-config field/solver files. (Other scenes have a single fixed config.)">
            <select id="config-select" disabled>
              <option value="face">face</option>
              <option value="edge">edge</option>
              <option value="twist1">twist1</option>
              <option value="twist2">twist2</option>
              <option value="corner">corner</option>
              <option value="dipole">dipole</option>
            </select>
          </label>
        </div>

        <label id="strength-control" title="Coil drive / current scale (logarithmic: 0.1× … 10×, centre = 1×). In the NGSolve scene this is the knob that pushes iron into saturation.">
          Strength
          <input type="range" id="strength-slider" min="0" max="1" step="0.001" value="0.5">
          <span class="val" id="strength-val">1.00</span>
        </label>

        <div id="cylinder-controls" class="control-section">
          <label title="Cube envelope outline (Ou)">
            Ou outline
            <input type="range" id="ou-opacity-slider" min="0" max="1" step="0.01" value="0.35">
            <span class="val" id="ou-opacity-val">0.35</span>
          </label>
          <label title="Steel solid skin (NGSolve mesh surface)">
            Parts
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
            <span class="val" id="opacity-val">0.50</span>
          </label>
          <label title="NGSolve mesh opacity — steel grey, coil amber, air blue wireframe">
            Mesh
            <input type="range" id="metal-opacity-slider" min="0" max="1" step="0.01" value="0">
            <span class="val" id="metal-opacity-val">0.00</span>
          </label>
          <label title="Coil current arrows">
            Current
            <input type="range" id="current-opacity-slider" min="0" max="1" step="0.01" value="0.85">
            <span class="val" id="current-opacity-val">0.85</span>
          </label>
          <label title="Traced B-field lines">
            B lines
            <input type="range" id="bline-opacity-slider" min="0" max="1" step="0.01" value="0.9">
            <span class="val" id="bline-opacity-val">0.90</span>
          </label>
          <label title="Force-metric isosurface: far left = off. Moving right raises the level (logarithmic), shrinking the surface toward the strongest field. The metric is the magnetic pressure B²/2μ₀ — the attractive force density between two equal fields facing each other — so it is an isosurface of |B|. Drawn at the B-lines opacity.">
            B surf
            <input type="range" id="bsurf-slider" min="0" max="1" step="0.001" value="0">
            <span class="val" id="bsurf-val">off</span>
          </label>
          <label title="Steel UNSATURATED permeability μ_init for the B-line solve (log scale); 1 = air.">
            Steel μ
            <input type="range" id="bline-mu-slider" min="0" max="1" step="0.001" value="0.811">
            <span class="val" id="bline-mu-val">1000</span>
          </label>
          <div class="checkbox" style="display:flex;align-items:center;gap:8px;">
            <label class="checkbox" style="flex:0 0 auto;width:auto;" title="Ext grid: enlarge the meshed air box (≈200 mm vs 76 mm) so the far field needed for later two-body force/motion work is captured. Toggling rebuilds the mesh (coarser far-air elements keep it tractable). Does not solve.">
              <input type="checkbox" id="extgrid-checkbox">
              Ext grid
            </label>
            <button id="build-fields-btn" disabled title="Build field files (12-dipole scene): turn on the extended grid, set Strength to 1×, rebuild the grid once, then solve every config (face / edge / twist1 / twist2 / corner) as a linear basis and write one reusable vector-B field file per config — each recording exactly which dipoles are driven and at what weight — into the /fields folder. Progress shows under the Solve button.">build</button>
          </div>
          <label class="checkbox" title="Sat ON = nonlinear B–H saturation for typical iron (Newton + current ramping; slower, physically correct). Sat OFF = fast linear solve at the slider μ (no saturation). NGSolve scene only.">
            <input type="checkbox" id="sat-checkbox">
            Sat
            <span class="val" id="drive-readout" title="Ohmic power at the current Strength (solid-copper winding, ∝ strength²) and total mass of iron + copper.">—</span>
          </label>
          <button id="solve-btn">Solve B field</button>
          <div id="solve-status"></div>
        </div>

        <div id="motion-controls" class="control-section">
          <div class="panel-title">Box A</div>
          <label class="mode-label" title="Box A excitation pattern (which edge coils are driven).">
            <select id="cfgA">
              <option value="face">face</option>
              <option value="edge">edge</option>
              <option value="twist1">twist1</option>
              <option value="twist2">twist2</option>
              <option value="corner">corner</option>
              <option value="dipole">dipole</option>
            </select>
          </label>
          <label class="mode-label" title="Box A orientation: primary face-axis the config points along.">
            <select id="axisA">
              <option value="+Z">+Z</option>
              <option value="-Z">-Z</option>
              <option value="+X">+X</option>
              <option value="-X">-X</option>
              <option value="+Y">+Y</option>
              <option value="-Y">-Y</option>
            </select>
          </label>
          <label class="mode-label" title="Box A roll: NSEW rotation about the chosen axis (N=0°, E=90°, S=180°, W=270°).">
            <select id="rollA">
              <option value="N">N</option>
              <option value="E">E</option>
              <option value="S">S</option>
              <option value="W">W</option>
            </select>
          </label>
          <label title="Box A power & polarity: magnitude = current on a log scale 0.1×–1× (1%–100% power, since power ∝ current²); sign reverses polarity (flips all arrows).">
            Power
            <input type="range" id="powA" min="-1" max="1" step="0.01" value="1">
            <span class="val" id="powA-val">+100%</span>
          </label>

          <div class="panel-title">Box B</div>
          <label class="mode-label" title="Box B excitation pattern (which edge coils are driven).">
            <select id="cfgB">
              <option value="face">face</option>
              <option value="edge">edge</option>
              <option value="twist1">twist1</option>
              <option value="twist2">twist2</option>
              <option value="corner">corner</option>
              <option value="dipole">dipole</option>
            </select>
          </label>
          <label class="mode-label" title="Box B orientation: primary face-axis the config points along.">
            <select id="axisB">
              <option value="+Z">+Z</option>
              <option value="-Z">-Z</option>
              <option value="+X">+X</option>
              <option value="-X">-X</option>
              <option value="+Y">+Y</option>
              <option value="-Y">-Y</option>
            </select>
          </label>
          <label class="mode-label" title="Box B roll: NSEW rotation about the chosen axis (N=0°, E=90°, S=180°, W=270°).">
            <select id="rollB">
              <option value="N">N</option>
              <option value="E">E</option>
              <option value="S">S</option>
              <option value="W">W</option>
            </select>
          </label>
          <label title="Box B power & polarity: magnitude = current on a log scale 0.1×–1× (1%–100% power, since power ∝ current²); sign reverses polarity (flips all arrows).">
            Power
            <input type="range" id="powB" min="-1" max="1" step="0.01" value="1">
            <span class="val" id="powB-val">+100%</span>
          </label>
          <label title="Magnetic-pressure isosurface B²/2μ₀ of the SUPERPOSED two-cube field (read from the precomputed field files). Far left = off; right raises the level so the shell shrinks toward the strongest field in the gap.">
            B field
            <input type="range" id="motion-bsurf-slider" min="0" max="1" step="0.001" value="0">
            <span class="val" id="motion-bsurf-val">off</span>
          </label>
          <label title="Force visualization (Maxwell-stress cross term). Green = net force from each cube's centre; magenta = per-corner differential arrows showing twist. Far left = off; right scales arrow length.">
            Force
            <input type="range" id="motion-force-slider" min="0" max="1" step="0.01" value="0">
            <span class="val" id="motion-force-val" title="Net magnetic force on box 1 in real Newtons, next to its weight m·g.">off</span>
          </label>

          <div class="panel-title">Animation</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
            <button id="motion-play-btn" title="Play / pause the real-SI force-driven motion (Newtons, kg, drag + bounce).">▶ Play</button>
            <button id="motion-step-btn" title="Advance one fixed time step while paused.">Step</button>
            <button id="motion-save-btn" title="Save the current cube poses (positions + orientations) as the restore point.">Save</button>
            <button id="motion-restore-btn" title="Stop and restore cubes to the last saved poses (velocities zeroed).">Restore</button>
          </div>
          <label title="Time / strength multiplier on top of REAL physics (logarithmic; centre = 1× real time). Forces (N) and gravity are real SI, so 1× is the true rate; slow down to study, speed up to fast-forward.">
            Speed
            <input type="range" id="motion-speed-slider" min="0" max="1" step="0.01" value="0.5">
            <span class="val" id="motion-speed-val">1.0×</span>
          </label>
          <label title="Drag (air/eddy-current damping). Left = frictionless; right = motion bleeds off quickly. Damps both translation and spin.">
            Drag
            <input type="range" id="motion-drag-slider" min="0" max="1" step="0.01" value="0.25">
            <span class="val" id="motion-drag-val">—</span>
          </label>
          <label title="Bounce (restitution) when cubes collide or hit the world boundary. 0% = stick (no rebound); 100% = perfectly elastic.">
            Bounce
            <input type="range" id="motion-bounce-slider" min="0" max="1" step="0.01" value="0.4">
            <span class="val" id="motion-bounce-val">—</span>
          </label>
          <label title="Gravity (log scale). Far left = OFF and the floor disappears. Right increases downward gravity; 1.0 g = Earth. A frictionless floor appears and bounces (Bounce slider) whenever gravity is on.">
            Gravity
            <input type="range" id="motion-grav-slider" min="0" max="1" step="0.01" value="0">
            <span class="val" id="motion-grav-val">off</span>
          </label>
          <div id="motion-power" style="font-size:11px;color:#8b949e;margin-top:4px;" title="Live ohmic power draw of both cubes' coils at the current drive levels (real Watts from the solver; scales with current²).">power: —</div>
          <div id="motion-status" style="font-size:11px;color:#8b949e;margin-top:6px;">
            Yellow arrows = magnetic north per energised edge. Drag to orbit.
            Double-click a cube to grab it (tints orange): drag = rotate it,
            right-drag = move it. Double-click empty space to release.
          </div>
        </div>

        <button id="restart-btn">Restart</button>
      </aside>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
