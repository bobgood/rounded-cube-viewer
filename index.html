<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounded cube viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #0d1117;
      }
      #app { width: 100%; height: 100%; }

      #controls {
        position: fixed;
        top: 12px;
        right: 12px;
        background: rgba(13,17,23,0.85);
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px 16px;
        color: #c9d1d9;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 200px;
        backdrop-filter: blur(6px);
      }
      #controls label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      #controls input[type=range] {
        flex: 1;
        accent-color: #3d8bfd;
      }
      #controls span.val {
        min-width: 32px;
        text-align: right;
        color: #8b949e;
      }
      #restart-btn, #demo-btn {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        padding: 6px 0;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }
      #restart-btn:hover, #demo-btn:hover { background: #30363d; }
      #demo-btn { border-color: #3d8bfd; color: #79b8ff; }

      #ws-status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        color: #8b949e;
        padding-top: 2px;
      }
      #ws-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: #f85149;
        flex-shrink: 0;
        transition: background 0.3s;
      }

      #hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        color: #8b949e;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="controls">
      <label>
        Spin
        <input type="range" id="spin-slider" min="0" max="5" step="0.1" value="0.8">
        <span class="val" id="spin-val">0.8</span>
      </label>
      <label>
        Damping
        <input type="range" id="damp-slider" min="0.90" max="1.00" step="0.001" value="0.985">
        <span class="val" id="damp-val">0.985</span>
      </label>
      <label>
        Strength
        <input type="range" id="strength-slider" min="0" max="2" step="0.05" value="0.4">
        <span class="val" id="strength-val">0.40</span>
      </label>
      <button id="restart-btn">⟳ Restart</button>
      <button id="demo-btn">▶ Attract Demo</button>
      <div id="ws-status">
        <div id="ws-dot"></div>
        <span id="ws-text">No Python server</span>
      </div>
    </div>

    <div id="hint">
      Left drag: orbit · Right drag: pan · Scroll: zoom
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
